user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Upstream Backend Load Balancer Cluster (Least Connections algorithm)
    upstream fastapi_claims_backend {
        least_conn;
        server backend1:8000 max_fails=3 fail_timeout=10s;
        server backend2:8000 max_fails=3 fail_timeout=10s;
        server backend3:8000 max_fails=3 fail_timeout=10s;
    }

    server {
        listen 80;
        server_name localhost;

        client_max_body_size 50M;

        # 1. Server-Sent Events (SSE) Live Stream Endpoint
        # Matches /claims/{claim_id}/events and /api/claims/{claim_id}/events
        location ~ ^/(api/)?claims/[^/]+/events$ {
            rewrite ^/api/(.*)$ /$1 break;
            proxy_pass http://fastapi_claims_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Critical SSE Load Balancing & Buffering Settings
            proxy_buffering off;
            proxy_cache off;
            proxy_set_header Connection '';
            proxy_http_version 1.1;
            chunked_transfer_encoding on;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # 2. FastAPI Direct Endpoint Proxies
        location ~ ^/(login|register|logout|me|claims|admin|adjusters|change-password|predict|health|uploads) {
            proxy_pass http://fastapi_claims_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # 3. FastAPI Prefix Endpoint Proxy (/api/)
        location /api/ {
            proxy_pass http://fastapi_claims_backend/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # 4. Frontend Static Asset & Single-Page App Proxy (Port 80 on frontend container)
        location / {
            proxy_pass http://frontend:80;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
